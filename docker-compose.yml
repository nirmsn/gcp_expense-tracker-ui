version: "3.9"

# ─────────────────────────────────────────────────────────
# Local development stack
#   docker compose up --build
# ─────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: expense-mysql:local
    container_name: expense-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: expense_db
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "expense_user", "-pexpense_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: expense-backend:local
    container_name: expense-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_pass
      MYSQL_DB: expense_db
      JWT_SECRET_KEY: local-dev-secret-change-in-prod
    ports:
      - "5000:5000"

  # ── React UI ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: expense-frontend:local
    container_name: expense-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:8080"
    environment:
      REACT_APP_AUTH_URL: http://localhost:5000/api/auth
      REACT_APP_FEED_URL: http://localhost:5000/api/expenses/feed
      REACT_APP_FETCH_URL: http://localhost:5000/api/expenses/fetch

volumes:
  mysql_data:
