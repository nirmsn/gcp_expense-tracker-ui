replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/ivoxa-form-dev/my-repo-dev/expense-ui-dev
  tag: "dev-869d5f9712ee79a3d85155276d95338764067162"
  pullPolicy: Always

imagePullSecrets:
  - name: gcp-secret

# service
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

container:
  port: 8080 
    

livenessProbe: null
readinessProbe: null

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: dev.ivoxa.ai
      paths:
        - path: /
          pathType: Prefix

  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

  tls:
    - hosts:
        - dev.ivoxa.ai
      secretName: dev-ivoxa-tls

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"