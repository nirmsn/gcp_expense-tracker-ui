name: Deploy

on:
  workflow_run:
    workflows: ["Build and push to GCP"]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.PROJECT_ID }}
  REGION: us-central1
  SERVICE: expense-ui-prod
  REPO: my-repo-prod
  IMAGE: expense-ui-prod

jobs:
  deploy:
    if: ${{github.event.workflow_run.conclusion == 'success'}}
    runs-on: self-hosted

    environment: production

    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \ 
            --allow-unauthenticated