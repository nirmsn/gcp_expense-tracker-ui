name: Build and push to GCP

on:
  workflow_run:
    workflows: ["SonarQube Scan"]
    types:
      - completed
env:
  PROJECT_ID: ${{secrets.PROJECT_ID}}
  REGION: us-central1
  REPO: my-repo
  IMAGE: rect-nginx

jobs:
  build:
    if: ${{github.event.workflow_run.conclusion == 'success'}}
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v3

    # Authenticat to GCP
    - name: Auth to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{secrets.GCP_SA_KEY}}'

    # configure Docker auth
    - name: Configure Docker
      run: |
        gcloud auth configure-docker $REGION-docker.pkg.dev

    # Build docker Image
    - name: BUild Image
      run: |
        docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha}} .

    # push Docker image
    - name: PUSH Image
      run : |
        docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha}}